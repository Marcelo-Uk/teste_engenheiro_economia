name: desafio-nfe

x-airflow-common: &airflow-common
  build:
    context: ./docker/airflow
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "false"
    AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth"
    PYTHONPATH: /opt/project
    JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
    KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    HIVE_METASTORE_URI: thrift://hive-metastore:9083
  user: "${AIRFLOW_UID:-50000}:0"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./config:/opt/airflow/config
    - ./jobs:/opt/project/jobs
    - ./xmls:/opt/project/xmls:ro
    - ./sql:/opt/project/sql
    - ./conf:/opt/project/conf
    - hive_warehouse:/opt/hive/data/warehouse
  networks:
    - nfe-net

services:
  postgres-airflow:
    image: postgres:16
    container_name: postgres-airflow
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_airflow_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - nfe-net

  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    depends_on:
      postgres-airflow:
        condition: service_healthy
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create
      --username admin
      --password admin
      --firstname Admin
      --lastname User
      --role Admin
      --email admin@example.com || true
      "
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    depends_on:
      postgres-airflow:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    command: webserver
    ports:
      - "18080:8080"
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    depends_on:
      postgres-airflow:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    command: scheduler
    restart: unless-stopped

  kafka:
    image: apache/kafka:4.1.2
    container_name: kafka
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://kafka:9092,CONTROLLER://kafka:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped
    networks:
      - nfe-net

  spark-master:
    image: apache/spark:4.0.2-python3
    container_name: spark-master
    hostname: spark-master
    user: "0:0"
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
      --host spark-master
      --port 7077
      --webui-port 8080
    ports:
      - "7077:7077"
      - "18081:8080"
    volumes:
      - ./jobs:/opt/project/jobs
      - ./xmls:/opt/project/xmls:ro
      - ./sql:/opt/project/sql
      - ./conf:/opt/project/conf
      - ./conf/hive/hive-site.xml:/opt/spark/conf/hive-site.xml:ro
      - hive_warehouse:/opt/hive/data/warehouse
      - spark_events:/tmp/spark-events
    restart: unless-stopped
    networks:
      - nfe-net

  spark-worker:
    image: apache/spark:4.0.2-python3
    container_name: spark-worker
    hostname: spark-worker
    user: "0:0"
    depends_on:
      - spark-master
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077
      --webui-port 8081
    ports:
      - "8082:8081"
    volumes:
      - ./jobs:/opt/project/jobs
      - ./xmls:/opt/project/xmls:ro
      - ./sql:/opt/project/sql
      - ./conf:/opt/project/conf
      - ./conf/hive/hive-site.xml:/opt/spark/conf/hive-site.xml:ro
      - hive_warehouse:/opt/hive/data/warehouse
      - spark_events:/tmp/spark-events
    restart: unless-stopped
    networks:
      - nfe-net

  postgres-hive:
    image: postgres:17-bookworm
    container_name: postgres-hive
    environment:
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive
      POSTGRES_DB: metastore_db
    volumes:
      - postgres_hive_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive -d metastore_db"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - nfe-net

  hive-metastore:
    image: apache/hive:4.0.1
    container_name: hive-metastore
    hostname: hive-metastore
    depends_on:
      postgres-hive:
        condition: service_healthy
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      SERVICE_OPTS: >-
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://postgres-hive:5432/metastore_db
        -Djavax.jdo.option.ConnectionUserName=hive
        -Djavax.jdo.option.ConnectionPassword=hive
    ports:
      - "9083:9083"
    volumes:
      - hive_warehouse:/opt/hive/data/warehouse
      - ./drivers/postgresql.jar:/opt/hive/lib/postgresql.jar:ro
      - ./sql:/opt/project/sql
    restart: unless-stopped
    networks:
      - nfe-net

  hive-server2:
    image: apache/hive:4.0.1
    container_name: hive-server2
    hostname: hive-server2
    depends_on:
      - hive-metastore
    environment:
      SERVICE_NAME: hiveserver2
      IS_RESUME: "true"
      SERVICE_OPTS: >-
        -Dhive.metastore.uris=thrift://hive-metastore:9083
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://postgres-hive:5432/metastore_db
        -Djavax.jdo.option.ConnectionUserName=hive
        -Djavax.jdo.option.ConnectionPassword=hive
    ports:
      - "10000:10000"
      - "10002:10002"
    volumes:
      - hive_warehouse:/opt/hive/data/warehouse
      - ./drivers/postgresql.jar:/opt/hive/lib/postgresql.jar:ro
      - ./sql:/opt/project/sql
    restart: unless-stopped
    networks:
      - nfe-net

networks:
  nfe-net:
    driver: bridge

volumes:
  postgres_airflow_data:
  postgres_hive_data:
  kafka_data:
  hive_warehouse:
  spark_events:
